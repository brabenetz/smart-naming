smartnaming:
  used-model: wiremock-test
  max-retries: 3
  models:
    local-qwen:
      url: http://localhost:1234/v1
      model: qwen3.5_4B-test
    open-ai:
      url: https://api.openai.com/v1
      model: gpt-4-test
      auth:
        api-token: test-token
    wiremock-test:
      url: http://localhost:18089/v1
      model: test-model
  system-prompt: |
    Return ONLY JSON mapping original filenames to new names.
    Schema: YYYY-MM-DD_SOURCE_DESCRIPTION_(COUNTER).ext

windows-registry:
  target-folder: ./target/tests/SmartNamingCommandLineApplicationIntegrationTest/
  installation-folder: ./src/main/assembly/shell