# Application configuration (external, not bundled in JAR)
smartnaming:
  used-model: local-qwen
  models:
    local-qwen:
      url: http://localhost:1234/v1
      model: qwen3.5_4B
    open-ai:
      url: https://api.openai.com/v1
      model: gpt-4
      auth:
        api-token: ${OPENAI_API_KEY:}
  system-prompt: |
    Some very complex multi-line prompt -> Must be defined later

windows-registry:
  target-folder: ./windows-registry
  installation-folder: ./